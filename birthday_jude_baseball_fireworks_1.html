  <canvas id="fw"></canvas>
  <div id="greeting">
    <h1>Hey Jude!</h1>
    <p>Happy 12th Birthday</p>
  </div>
</div>

<script>
const fwC = document.getElementById('fw');
const ctx = fwC.getContext('2d');
const wrap = document.getElementById('wrap');

function resize(){
  fwC.width = wrap.offsetWidth;
  fwC.height = wrap.offsetHeight;
}


resize();
window.addEventListener('resize', resize);

const colors=['#4db8ff','#EF3E42','#ffffff','#ffdd00','#A5D8FF','#ff88aa','#88ffcc','#ffaa44','#005A9C','#ff4488'];

function spawnLabel(x,y){
  const el=document.createElement('div');
  el.className='burst-label';
  el.textContent='12th';
  el.style.left=x+'px'; el.style.top=y+'px';
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

function drawBaseball(c, x, y, r, rot){
  c.save();
  c.translate(x, y);
  c.rotate(rot);
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2);
  c.fillStyle = '#f5f5f0';
  c.fill();
  c.lineWidth = Math.max(1, r*0.06);
  c.strokeStyle = '#cccccc';
  c.stroke();
  c.lineWidth = Math.max(1.2, r*0.09);
  c.strokeStyle = '#EF3E42';
  c.beginPath();
  c.arc(-r*1.15, 0, r*1.45, -Math.PI*0.32, Math.PI*0.32);
  c.stroke();
  c.beginPath();
  c.arc(r*1.15, 0, r*1.45, Math.PI - Math.PI*0.32, Math.PI + Math.PI*0.32);
  c.stroke();
  const stitch = (cx2, cy2, side) => {
    c.lineWidth = Math.max(1, r*0.06);
    c.beginPath();
    c.moveTo(cx2 - r*0.12*side, cy2 - r*0.1);
    c.lineTo(cx2 + r*0.12*side, cy2 + r*0.1);
    c.stroke();
  };
  for(let i=-2;i<=2;i++){
    stitch(-r*0.42, i*r*0.28, 1);
    stitch(r*0.42, i*r*0.28, -1);
  }
  c.restore();
}

class Particle{
  constructor(x,y,color){
    this.x=x;this.y=y;this.color=color;
    const a=Math.random()*Math.PI*2,s=Math.random()*7+2;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.life=1;this.decay=Math.random()*0.018+0.01;
    this.size=Math.random()*3.5+1;this.trail=[];
    this.isBall=false;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>6)this.trail.shift();
    this.vy+=0.13;this.vx*=0.98;
    this.x+=this.vx;this.y+=this.vy;
    this.life-=this.decay;
    if(this.isBall) this.rot += this.spin;
  }
  draw(){
    ctx.save();
    if(this.isBall){
      ctx.globalAlpha=Math.min(1, this.life*1.5);
      drawBaseball(ctx, this.x, this.y, this.size, this.rot);
      ctx.restore();
      return;
    }
    for(let i=0;i<this.trail.length;i++){
      ctx.globalAlpha=(i/this.trail.length)*this.life*0.45;
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,this.size*0.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=this.life;ctx.fillStyle=this.color;
    ctx.shadowColor=this.color;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class Rocket{
  constructor(){
    this.x=Math.random()*fwC.width*0.8+fwC.width*0.1;
    this.y=fwC.height;
    this.tx=Math.random()*fwC.width*0.72+fwC.width*0.14;
    this.ty=Math.random()*fwC.height*0.48+fwC.height*0.04;
    const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.sqrt(dx*dx+dy*dy),sp=Math.random()*4+9;
    this.vx=(dx/d)*sp;this.vy=(dy/d)*sp;
    this.color=colors[Math.floor(Math.random()*colors.length)];
    this.trail=[];this.done=false;this.exploded=false;
    this.rot=Math.random()*Math.PI*2;
    this.spin=0.15+Math.random()*0.1;
  }
  update(particles){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    this.rot+=this.spin;
    if(this.vy>0||(Math.abs(this.x-this.tx)<8&&Math.abs(this.y-this.ty)<8)){
      if(!this.exploded){this.explode(particles);this.exploded=true;}
      this.done=true;
    }
  }
  explode(particles){
    spawnLabel(this.x,this.y);
    const count=Math.floor(Math.random()*60)+80;
    for(let i=0;i<count;i++)particles.push(new Particle(this.x,this.y,this.color));
    for(let i=0;i<25;i++){
      const p=new Particle(this.x,this.y,'#ffffff');
      const a=(i/25)*Math.PI*2;p.vx=Math.cos(a)*10;p.vy=Math.sin(a)*10;
      p.decay=0.04;p.size=1.5;particles.push(p);
    }
    // mini baseballs flying out of the explosion
    const numBalls = 6 + Math.floor(Math.random()*3);
    for(let i=0;i<numBalls;i++){
      const p=new Particle(this.x,this.y,'#fff');
      const a=(i/numBalls)*Math.PI*2 + Math.random()*0.4;
      const sp = (4.5 + Math.random()*3) * 0.32;
      p.vx=Math.cos(a)*sp; p.vy=Math.sin(a)*sp - 1;
      p.decay=0.014; p.size=7+Math.random()*4;
      p.isBall=true;
      p.rot=Math.random()*Math.PI*2;
      p.spin=(Math.random()-0.5)*0.4;
      particles.push(p);
    }
  }
  draw(){
    ctx.save();
    for(let i=0;i<this.trail.length;i++){
      ctx.globalAlpha=(i/this.trail.length)*0.8;
      ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.restore();
    drawBaseball(ctx, this.x, this.y, 8, this.rot);
  }
}

let particles=[],rockets=[],frame=0,nextLaunch=18;
function loop(){
  ctx.clearRect(0,0,fwC.width,fwC.height);
  frame++;
  if(frame>=nextLaunch){
    rockets.push(new Rocket());
    nextLaunch=frame+Math.floor(Math.random()*50)+22;
    if(rockets.length>10)rockets.splice(0,1);
  }
  rockets=rockets.filter(r=>{r.update(particles);if(!r.done)r.draw();return !r.done;});
  particles=particles.filter(p=>{p.update();p.draw();return p.life>0;});
  requestAnimationFrame(loop);
}
loop();
</script>
